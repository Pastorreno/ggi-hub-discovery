<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GGI Hub | AI Strategy Audit</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
        <style>
            body { background-color: #0B0E14; color: #E5E7EB; font-family: 'Inter', sans-serif; }
            .cyber-lime { color: #CCFF00; }
            .bg-cyber-lime { background-color: #CCFF00; }
            .border-cyber-lime { border-color: #CCFF00; }
            .card-bg { background-color: #151921; }
            .mono { font-family: 'JetBrains Mono', monospace; }
        </style>
    </head>
    <body class="min-h-screen p-6 md:p-12">
        <nav class="max-w-3xl mx-auto flex justify-between items-center mb-16">
            <a href="index.html" class="text-2xl font-black italic tracking-tighter">GGI <span class="cyber-lime">HUB</span></a>
            <div class="text-xs tracking-widest text-gray-500 uppercase font-bold">Audit v1.0</div>
        </nav>
    
        <main class="max-w-3xl mx-auto">
            <header class="mb-12">
                <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase">System <span class="cyber-lime">Audit.</span></h1>
                <p class="text-gray-400 text-lg border-l-2 border-cyber-lime pl-6">Identify the exact AI architecture required to 10x your business output.</p>
            </header>
    
            <form id="auditForm" class="space-y-8">
                <div class="card-bg p-8 rounded-2xl border border-gray-800">
                    <label class="block text-sm font-bold tracking-widest uppercase text-gray-500 mb-4">01. Primary Bottleneck</label>
                    <select name="bottleneck" class="w-full bg-[#0B0E14] border border-gray-700 p-4 rounded-lg focus:border-cyber-lime outline-none transition-all mono text-sm">
                        <option value="lead-gen">Lead Generation & Outreach</option>
                        <option value="content">Content Creation & Marketing</option>
                        <option value="ops">Internal Operations & Workflows</option>
                        <option value="dev">Software & Product Development</option>
                    </select>
                </div>
    
                <div class="card-bg p-8 rounded-2xl border border-gray-800">
                    <label class="block text-sm font-bold tracking-widest uppercase text-gray-500 mb-4">02. Current Team Size</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="teamSize" value="solo" class="hidden peer" checked>
                            <div class="p-4 border border-gray-700 rounded-lg text-center peer-checked:border-cyber-lime peer-checked:text-cyber-lime transition-all text-xs font-bold uppercase">Solo</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="teamSize" value="2-5" class="hidden peer">
                            <div class="p-4 border border-gray-700 rounded-lg text-center peer-checked:border-cyber-lime peer-checked:text-cyber-lime transition-all text-xs font-bold uppercase">2-5</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="teamSize" value="6-20" class="hidden peer">
                            <div class="p-4 border border-gray-700 rounded-lg text-center peer-checked:border-cyber-lime peer-checked:text-cyber-lime transition-all text-xs font-bold uppercase">6-20</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="teamSize" value="20+" class="hidden peer">
                            <div class="p-4 border border-gray-700 rounded-lg text-center peer-checked:border-cyber-lime peer-checked:text-cyber-lime transition-all text-xs font-bold uppercase">20+</div>
                        </label>
                    </div>
                </div>
    
                <div class="card-bg p-8 rounded-2xl border border-gray-800">
                    <label class="block text-sm font-bold tracking-widest uppercase text-gray-500 mb-4">03. Target Efficiency Gain</label>
                    <input type="range" name="efficiency" min="10" max="100" value="50" class="w-full accent-cyber-lime">
                    <div class="flex justify-between text-[10px] uppercase font-bold text-gray-600 mt-2 mono">
                        <span>10% Growth</span>
                        <span>100% Automation</span>
                    </div>
                </div>
    
                <button type="submit" class="w-full py-6 bg-cyber-lime text-black font-black uppercase tracking-[0.2em] text-lg rounded-xl hover:scale-[1.02] transition-all shadow-[0_0_30px_rgba(204,255,0,0.2)]">
                    Generate Architecture Report
                </button>
            </form>
    
            <div id="results" class="hidden mt-12 p-8 border-2 border-cyber-lime rounded-2xl card-bg">
                <h3 class="text-cyber-lime font-black text-2xl mb-4 uppercase italic">Audit Analysis Complete.</h3>
                <p id="recommendationText" class="text-gray-300 leading-relaxed mb-8"></p>
                <a href="mailto:contact@ggi-hub.com" class="inline-block px-8 py-4 border-2 border-cyber-lime text-cyber-lime font-black uppercase tracking-widest text-sm rounded-lg hover:bg-cyber-lime hover:text-black transition-all">Claim Strategy Session</a>
            </div>
        </main>
    
        <script>
            document.getElementById('auditForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                const bottleneck = formData.get('bottleneck');
                
                let recommendation = "";
                if (bottleneck === 'lead-gen') {
                    recommendation = "Our analysis suggests an **n8n Autonomous Outreach Agent** is your highest-leverage move. We can architect a system that identifies, qualifies, and messages 50+ high-ticket leads daily with zero manual input.";
                } else if (bottleneck === 'content') {
                    recommendation = "The **Digital Twin Content Engine** (HeyGen + ElevenLabs) is your optimal solution. We'll build a custom avatar that allows you to produce 30 days of high-authority video content in under 2 hours.";
                } else {
                    recommendation = "An **Enterprise Workflow Audit** is required. Your bottlenecks suggest fragmented operations that a custom Replit-based agent suite can consolidate into a single autonomous dashboard.";
                }
    
                document.getElementById('recommendationText').innerHTML = recommendation;
                document.getElementById('auditForm').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        </script>
    </body>
    </html>
